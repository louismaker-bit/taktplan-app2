<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Taktplan</title>
  <style>
    html, body{
      height: 100%;
      overscroll-behavior: none;
    }

    :root{
      --bg: #0b0c10;
      --card: rgba(255,255,255,.06);
      --card2: rgba(255,255,255,.08);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.62);
      --border: rgba(255,255,255,.14);
      --accent: #7dd3fc;
      --ok: rgba(34,197,94,.16);
      --warn: rgba(245,158,11,.16);
      --err: rgba(239,68,68,.18);
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius: 16px;
      --pad: 14px;
      --tap: 48px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }

    body{
      margin: 0;
      font-family: var(--sans);
      background:
        radial-gradient(1200px 600px at 20% -10%, rgba(125,211,252,.14), transparent 60%),
        var(--bg);
      background-attachment: fixed;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      padding-bottom: 28px;
    }

    .topbar{
      padding: 12px 14px calc(12px + env(safe-area-inset-top));
      backdrop-filter: blur(14px);
      background: linear-gradient(to bottom, rgba(0,0,0,.30), transparent);
      border-bottom: 1px solid var(--border);
    }
    .topbar-inner{
      max-width: 820px;
      margin: 0 auto;
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap: wrap;
    }
    .title{ font-weight: 900; letter-spacing: .2px; }
    .sub{ font-size: 12px; color: var(--muted); margin-top: 2px; }
    .grow{ flex: 1; }

    .seg{
      display:flex; border: 1px solid var(--border); border-radius: 999px; overflow:hidden;
      background: var(--card);
      box-shadow: var(--shadow);
      flex: 0 0 auto;
    }
    .seg button{
      height: 36px; min-width: 60px;
      border: 0; background: transparent; color: var(--muted);
      padding: 0 10px; font-weight: 800;
    }
    .seg button.active{ color: var(--text); background: rgba(125,211,252,.14); }

    .wrap{ max-width: 820px; margin: 0 auto; padding: 14px; }

    .card{
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--pad);
      background: var(--card2);
      box-shadow: var(--shadow);
      margin-top: 12px;
    }

    .grid2{ display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @media (max-width: 540px){ .grid2{ grid-template-columns: 1fr; } }

    label{ display:block; font-weight: 900; margin: 10px 0 6px; color: var(--text); }

    textarea{
      width:100%; min-height: 130px; resize: vertical;
      border-radius: 14px; border: 1px solid var(--border);
      background: var(--card); color: var(--text);
      padding: 12px; font-size: 14px;
    }
    select, input{
      width: 100%;
      height: var(--tap);
      border-radius: 14px; border: 1px solid var(--border);
      background: var(--card); color: var(--text);
      padding: 0 12px; font-size: 16px;
    }

    button.btn{
      height: var(--tap);
      border-radius: 14px; border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.04));
      color: var(--text);
      font-weight: 900;
      width: 100%;
    }
    button.btn.primary{
      border-color: rgba(125,211,252,.35);
      background: linear-gradient(180deg, rgba(125,211,252,.22), rgba(125,211,252,.10));
    }
    button.btn:active{ transform: translateY(1px); }

    .small{ font-size: 12px; color: var(--muted); line-height: 1.35; }

    .pill{
      display:inline-flex; gap:8px; align-items:center;
      padding: 6px 10px; border: 1px solid var(--border); border-radius: 999px;
      background: var(--card); color: var(--muted); font-size: 12px;
      margin: 6px 6px 0 0;
    }

    .result.ok{ background: var(--ok); border-color: rgba(34,197,94,.35); }
    .result.warn{ background: var(--warn); border-color: rgba(245,158,11,.35); }
    .result.err{ background: var(--err); border-color: rgba(239,68,68,.35); }
    .mono{ font-family: var(--mono); }

    .favbar{
      display:flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .favbar button{
      height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-weight: 900;
      font-size: 13px;
    }
    .favbar button:active{ transform: translateY(1px); }
    .favbar button.active{
      background: rgba(125,211,252,.24);
      border-color: rgba(125,211,252,.7);
    }

    .hide{ display:none !important; }

    table{ width:100%; border-collapse: collapse; margin-top: 10px; }
    th, td{ border-bottom: 1px solid var(--border); padding: 8px 6px; text-align:left; font-size: 14px; }
    th{ color: var(--muted); font-weight: 900; }

    #week table th, #week table td{ padding: 6px 4px; font-size: 13px; }
    @media (max-width: 420px){
      #week table th, #week table td{ padding: 5px 3px; font-size: 12px; }
    }
  </style>
</head>

<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div>
        <div class="title">Taktplan</div>
      </div>
      <div class="grow"></div>
      <div class="seg" aria-label="Haptik">
        <button id="haptOn" class="active" type="button">Haptik</button>
        <button id="haptOff" type="button">Aus</button>
      </div>
    </div>
  </div>

<div class="wrap">

<!-- 1 Gespeicherter Plan -->
<div class="card">
  <label>Gespeicherter Plan</label>
  <div class="grid2">
    <select id="planSelect"></select>
    <div class="grid2">
      <button class="btn" id="loadSaved">Laden</button>
      <button class="btn" id="deleteSaved">Löschen</button>
    </div>
  </div>
</div>

<!-- 2 Mitarbeiter -->
<div class="card">
  <div class="grid2">
    <div>
      <label>Mitarbeiter (Wochenübersicht)</label>
      <div id="empBar" class="favbar"></div>
    </div>

    <div>
      <label>Wochenstart</label>
      <select id="weekStart">
        <option value="mon">Mo–Fr</option>
        <option value="sun">So–Fr</option>
      </select>
    </div>
  </div>
</div>

<!-- 3 Wochenübersicht -->
<div id="week" class="card hide"></div>

<!-- 4 Status -->
<div class="card">
  <div id="activeStatus" class="small">Aktiver Plan: keiner</div>
</div>

<!-- 5 Ergebnis -->
<div id="result" class="card result hide"></div>

<!-- 6 Takt Suche -->
<div class="card">
  <label>Takt-Suche</label>

  <div class="grid2">
    <div>
      <label>Tag</label>
      <select id="searchDay">
        <option value="mo">Mo</option>
        <option value="di">Di</option>
        <option value="mi">Mi</option>
        <option value="do">Do</option>
        <option value="fr">Fr</option>
        <option value="sa">Sa</option>
        <option value="so">So</option>
      </select>
    </div>

    <div>
      <label>Runde</label>
      <select id="searchRound">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
      </select>
    </div>
  </div>

  <div class="grid2" style="margin-top:10px;">
    <div>
      <label>Station</label>
      <select id="searchStation"></select>
    </div>

    <div style="display:flex; align-items:flex-end;">
      <button class="btn primary" id="searchBtn">Suchen</button>
    </div>
  </div>
</div>

<!-- 7 Plan einfügen -->
<div class="card">
  <label>Plan einfügen (OCR / Tabelle)</label>

  <textarea id="table"></textarea>

  <div class="grid2" style="margin-top:10px;">
    <button class="btn primary" id="applyBtn">Plan anwenden</button>
    <button class="btn" id="clearBtn">Leeren</button>
  </div>

  <div id="diagPills"></div>
</div>

<!-- 8 Plan speichern -->
<div class="card">
  <label>Plan speichern</label>

  <input id="planName" placeholder="Name des Plans">

  <div class="grid2" style="margin-top:10px;">
    <button class="btn" id="saveNew">Als neuen Plan speichern</button>
    <button class="btn" id="overwriteActive">Aktiven Plan überschreiben</button>
  </div>
</div>

</div>

<script>
  const ROUNDS_PER_DAY = 4;
  const DAY_KEYS = ["mo","di","mi","do","fr","sa","so"];
  const DAY_NAMES = ["Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"];

  const STORAGE_KEY = "taktplan_saved_v7";
  const DRAFT_KEY   = "taktplan_draft_v2";
  const UI_KEY      = "taktplan_ui_v5";

  function normName(s){
    return (s || "")
      .trim()
      .replace(/\s+/g, " ")
      .toUpperCase()
      .replace(/Ä/g, "AE")
      .replace(/Ö/g, "OE")
      .replace(/Ü/g, "UE")
      .replace(/ß/g, "SS");
  }

  function safeHtml(str){
    return String(str ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function nowISO(){ return new Date().toISOString(); }
  function uid(){ return "p_" + Math.random().toString(16).slice(2) + "_" + Date.now().toString(16); }

  function loadJSON(key, fallback){
    try{
      const raw = localStorage.getItem(key);
      if(!raw) return fallback;
      return JSON.parse(raw);
    } catch {
      return fallback;
    }
  }

  function saveJSON(key, value){
    localStorage.setItem(key, JSON.stringify(value));
  }

  function loadState(){
    const s = loadJSON(STORAGE_KEY, { plans:{}, activeId:null });
    s.plans = s.plans || {};
    s.activeId = s.activeId || null;
    return s;
  }

  function saveState(state){
    saveJSON(STORAGE_KEY, state);
  }

  function saveDraft(){
    saveJSON(DRAFT_KEY, { text: elTable.value });
  }

  function loadDraft(){
    return loadJSON(DRAFT_KEY, null);
  }

  function dayKeyToName(dayKey){
    const idx = DAY_KEYS.indexOf(dayKey);
    return DAY_NAMES[idx >= 0 ? idx : 0];
  }

  function getDayIndex(dayKey, weekMode){
    if(weekMode === "sun"){
      const sunOrder = ["so","mo","di","mi","do","fr","sa"];
      return sunOrder.indexOf(dayKey);
    }
    return DAY_KEYS.indexOf(dayKey);
  }

  function cleanOCRText(text){
    return (text || "")
      .replace(/\r/g, "\n")
      .replace(/[|]/g, " ")
      .replace(/[¦]/g, " ")
      .replace(/[–—]/g, "-")
      .replace(/[“”„"]/g, '"')
      .replace(/[‘’]/g, "'")
      .replace(/\bB\s*E\s*S\s*E\s*T\s*Z\s*T\b/gi, "BESETZT")
      .replace(/\bBESET2T\b/gi, "BESETZT")
      .replace(/\bBE5ETZT\b/gi, "BESETZT")
      .replace(/\bBESET2T\b/gi, "BESETZT")
      .replace(/\bO(?=\d)/g, "0")
      .replace(/(?<=\d)O\b/g, "0")
      .replace(/\bI(?=\d)/g, "1")
      .replace(/(?<=\d)I\b/g, "1")
      .replace(/[ \t]+/g, " ")
      .replace(/\n{3,}/g, "\n\n")
      .trim();
  }

  function fixLikelyNumberToken(token){
  const t = String(token || "").trim();
  if(!/^[0-9OIlS]+$/.test(t)) return t;

  return t
    .replace(/O/g, "0")
    .replace(/I/g, "1")
    .replace(/l/g, "1")
    .replace(/S/g, "5");
  }

  function isLikelyNumber(token){
    return /^\d+$/.test(fixLikelyNumberToken(token));
  }

  function toNumber(token){
    const fixed = fixLikelyNumberToken(token);
    return /^\d+$/.test(fixed) ? parseInt(fixed, 10) : null;
  }

  function saveUiState(){
    const ui = loadJSON(UI_KEY, { haptics:"on" });
    ui.weekStart = elWeekStart.value;
    ui.searchDay = elSearchDay.value;
    ui.searchRound = elSearchRound.value;
    ui.searchStation = elSearchStation.value;
    ui.selectedEmployee = selectedEmployee;
    ui.planName = elPlanName.value;
    saveJSON(UI_KEY, ui);
  }

  function restoreUiState(){
    const ui = loadJSON(UI_KEY, { haptics:"on" });

    if(ui.weekStart) elWeekStart.value = ui.weekStart;
    if(ui.searchDay) elSearchDay.value = ui.searchDay;
    if(ui.searchRound) elSearchRound.value = ui.searchRound;
    if(ui.planName) elPlanName.value = ui.planName;
  }

  function setHaptics(v){
    const ui = loadJSON(UI_KEY, { haptics:"on" });
    ui.haptics = v;
    saveJSON(UI_KEY, ui);
    haptOn.classList.toggle("active", v === "on");
    haptOff.classList.toggle("active", v === "off");
  }

  function canVibrate(){
    return typeof navigator !== "undefined" && "vibrate" in navigator;
  }

  function haptic(kind){
    const ui = loadJSON(UI_KEY, { haptics:"on" });
    if(ui.haptics === "off") return;
    if(!canVibrate()) return;

    if(kind === "tap") navigator.vibrate(10);
    else if(kind === "ok") navigator.vibrate([12, 20, 12]);
    else if(kind === "err") navigator.vibrate([30, 40, 30]);
  }

  function scrollResultIntoView(){
    setTimeout(()=>{
      elResult.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }, 40);
  }

  function showOk(html, doHaptic=true){
    if(doHaptic) haptic("ok");
    elResult.classList.remove("hide","err","warn");
    elResult.classList.add("ok");
    elResult.innerHTML = html;
    scrollResultIntoView();
  }

  function showWarn(html, doHaptic=false){
    if(doHaptic) haptic("tap");
    elResult.classList.remove("hide","err","ok");
    elResult.classList.add("warn");
    elResult.innerHTML = html;
    scrollResultIntoView();
  }

  function showErr(msg, doHaptic=true){
    if(doHaptic) haptic("err");
    elResult.classList.remove("hide","ok","warn");
    elResult.classList.add("err");
    elResult.innerHTML = `<div><strong>Fehler:</strong> ${safeHtml(msg)}</div>`;
    scrollResultIntoView();
  }

  function hideWeek(){
    elWeek.classList.add("hide");
    elWeek.innerHTML = "";
  }

function parseTable(text){
  const raw = cleanOCRText(text);
  if(!raw) return { rows: [], skipped: [], meta: { mode: "empty" } };

  const rows = [];
  const skipped = [];

  const lines = raw.split(/\n+/).map(x => x.trim()).filter(Boolean);
  const looksLikeDelimitedTable = lines.some(line => /[;\t,]/.test(line));

  // 1) Echte Tabelle mit Trennzeichen
  if(looksLikeDelimitedTable){
    for(const line of lines){
      const parts = line.split(/[\t;,]+/).map(x => x.trim()).filter(Boolean);

      if(parts.length < 3){
        skipped.push({ line, reason: "zu wenig Spalten" });
        continue;
      }

      let takt = null;
      let idx = -1;

      for(let i=0; i<Math.min(2, parts.length); i++){
        if(isLikelyNumber(parts[i])){
          takt = toNumber(parts[i]);
          idx = i;
          break;
        }
      }

      if(takt === null || idx < 0){
        skipped.push({ line, reason: "keine Taktnummer erkannt" });
        continue;
      }

      if(idx + 2 >= parts.length){
        skipped.push({ line, reason: "Bezeichnung/Mitarbeiter fehlt" });
        continue;
      }

      const bezeichnung = (parts[idx + 1] || "").trim();
      const mitarbeiter = (parts[idx + 2] || "").trim();

      if(!bezeichnung || !mitarbeiter){
        skipped.push({ line, reason: "Bezeichnung oder Mitarbeiter leer" });
        continue;
      }

      rows.push({ takt, bezeichnung, mitarbeiter });
    }

    rows.sort((a,b)=>a.takt-b.takt);
    return { rows, skipped, meta: { mode: "delimited" } };
  }

  // 2) Mehrere saubere OCR-Zeilen, z. B.:
  // "1 Airbag DRILON"
  // "2 Bepl. Re. BESETZT"
  // usw.
  const multiLineLooksUseful =
    lines.length >= 3 &&
    lines.filter(line => {
      const tokens = line.split(/\s+/).filter(Boolean);
      return tokens.length >= 3 && isLikelyNumber(tokens[0]);
    }).length >= Math.ceil(lines.length * 0.5);

  if(multiLineLooksUseful){
    for(const line of lines){
      const tokens = line.split(/\s+/).filter(Boolean);

      if(tokens.length < 3){
        skipped.push({ line, reason: "zu kurz" });
        continue;
      }

      if(!isLikelyNumber(tokens[0])){
        skipped.push({ line, reason: "keine Taktnummer am Zeilenanfang erkannt" });
        continue;
      }

      const takt = toNumber(tokens[0]);
      const content = tokens.slice(1);

      if(content.length < 2){
        skipped.push({ line, reason: "zu wenig Inhalte nach Taktnummer" });
        continue;
      }

      const mitarbeiter = content[content.length - 1];
      const bezeichnung = content.slice(0, -1).join(" ").trim();

      if(!bezeichnung || !mitarbeiter){
        skipped.push({ line, reason: "Bezeichnung oder Mitarbeiter leer" });
        continue;
      }

      rows.push({ takt, bezeichnung, mitarbeiter });
    }

    rows.sort((a,b)=>a.takt-b.takt);
    return { rows, skipped, meta: { mode: "linewise" } };
  }

  // 3) Fallback für EINZEILIGES OCR:
  // "1 Airbag DRILON 2 Bepl. Re. BESETZT 3 Ablage Li. FLORIAN ..."
  const tokens = raw.replace(/\n/g, " ").split(/\s+/).filter(Boolean);

  let i = 0;
  while(i < tokens.length){
    if(!isLikelyNumber(tokens[i])){
      i++;
      continue;
    }

    const takt = toNumber(tokens[i]);
    const startToken = tokens[i];
    i++;

    const content = [];
    while(i < tokens.length && !isLikelyNumber(tokens[i])){
      content.push(tokens[i]);
      i++;
    }

    if(content.length < 2){
      skipped.push({
        line: `${startToken} ${content.join(" ")}`.trim(),
        reason: "zu wenig Inhalte nach Taktnummer"
      });
      continue;
    }

    const mitarbeiter = content[content.length - 1];
    const bezeichnung = content.slice(0, -1).join(" ").trim();

    if(!bezeichnung || !mitarbeiter){
      skipped.push({
        line: `${startToken} ${content.join(" ")}`.trim(),
        reason: "Bezeichnung oder Mitarbeiter leer"
      });
      continue;
    }

    rows.push({ takt, bezeichnung, mitarbeiter });
  }

  rows.sort((a,b)=>a.takt-b.takt);

  if(!rows.length){
    return {
      rows: [],
      skipped: [{ line: raw.slice(0, 200), reason: "keine gültigen Zeilen erkannt" }],
      meta: { mode: "fallback-failed" }
    };
  }

  return { rows, skipped, meta: { mode: "fallback-token" } };
}

  class TaktPlan{
    constructor(rows){
      if(!rows || rows.length === 0){
        throw new Error("Keine gültigen Zeilen erkannt.");
      }

      this.rows = rows;
      this.roundsPerDay = ROUNDS_PER_DAY;

      this.cycle = rows.filter(r => normName(r.mitarbeiter) !== "BESETZT");

      if(this.cycle.length === 0){
        throw new Error("Alle Einträge sind BESETZT – kein Rotationszyklus möglich.");
      }

      this.startIndex = new Map();
      this.cycle.forEach((r, i)=>{
        const key = normName(r.mitarbeiter);
        if(!this.startIndex.has(key)) this.startIndex.set(key, i);
      });
    }

    assignment(employee, dayKey, roundNo, weekMode="mon"){
      if(roundNo < 1 || roundNo > this.roundsPerDay){
        throw new Error(`Runde muss 1-${this.roundsPerDay} sein.`);
      }

      const empKey = normName(employee);
      if(!this.startIndex.has(empKey)){
        throw new Error(`Mitarbeiter '${employee}' nicht im Plan gefunden.`);
      }

      const d = getDayIndex(dayKey, weekMode);
      if(d < 0){
        throw new Error(`Ungültiger Tag: ${dayKey}`);
      }

      const steps = d * this.roundsPerDay + (roundNo - 1);
      const start = this.startIndex.get(empKey);
      const pos = (start + steps) % this.cycle.length;
      return this.cycle[pos];
    }

    weeklyOverview(employee, mode="mon"){
      const order = mode === "sun"
        ? ["so","mo","di","mi","do","fr"]
        : ["mo","di","mi","do","fr"];

      const out = [];
      for(const dayKey of order){
        const dayName = dayKeyToName(dayKey);
        for(let r=1; r<=this.roundsPerDay; r++){
          const row = this.assignment(employee, dayKey, r, mode);
          out.push({ tag: dayName, runde: r, station: row.bezeichnung, takt: row.takt });
        }
      }
      return out;
    }

    findEmployeesByStation(dayKey, roundNo, stationName, mode="mon"){
      const target = normName(stationName);
      const names = Array.from(this.startIndex.keys());
      const result = [];

      for(const key of names){
        const originalRow = this.cycle.find(r => normName(r.mitarbeiter) === key);
        if(!originalRow) continue;

        const employeeName = originalRow.mitarbeiter;
        const row = this.assignment(employeeName, dayKey, roundNo, mode);

        if(normName(row.bezeichnung) === target){
          result.push({ name: employeeName, station: row.bezeichnung, takt: row.takt });
        }
      }

      return result;
    }
  }

  function diagnostics(rows){
    if(!rows.length){
      return {
        count: 0,
        uniq: 0,
        min: null,
        max: null,
        dups: [],
        missing: [],
        occupiedCount: 0,
        stationCount: 0,
        employeeCount: 0
      };
    }

    const takts = rows.map(r=>r.takt).filter(n=>Number.isFinite(n));
    const uniq = new Set(takts);
    const dups = takts.filter((t, idx)=>takts.indexOf(t) !== idx);
    const min = takts.length ? Math.min(...takts) : null;
    const max = takts.length ? Math.max(...takts) : null;
    const missing = [];

    if(min !== null && max !== null){
      for(let t=min; t<=max; t++){
        if(!uniq.has(t)) missing.push(t);
      }
    }

    const occupiedCount = rows.filter(r => normName(r.mitarbeiter) === "BESETZT").length;
    const stationCount = new Set(rows.map(r => normName(r.bezeichnung))).size;
    const employeeCount = new Set(
      rows.filter(r => normName(r.mitarbeiter) !== "BESETZT").map(r => normName(r.mitarbeiter))
    ).size;

    return {
      count: rows.length,
      uniq: uniq.size,
      min,
      max,
      dups: Array.from(new Set(dups)),
      missing,
      occupiedCount,
      stationCount,
      employeeCount
    };
  }

  const haptOn = document.getElementById("haptOn");
  const haptOff = document.getElementById("haptOff");

  const empBar = document.getElementById("empBar");
  const elWeekStart = document.getElementById("weekStart");
  const elWeek = document.getElementById("week");

  const elSearchDay = document.getElementById("searchDay");
  const elSearchRound = document.getElementById("searchRound");
  const elSearchStation = document.getElementById("searchStation");
  const elSearchBtn = document.getElementById("searchBtn");

  const elResult = document.getElementById("result");

  const elPlanName = document.getElementById("planName");
  const elSaveNew = document.getElementById("saveNew");
  const elOverwriteActive = document.getElementById("overwriteActive");

  const elActiveStatus = document.getElementById("activeStatus");

  const elPlanSelect = document.getElementById("planSelect");
  const elLoadSaved = document.getElementById("loadSaved");
  const elDeleteSaved = document.getElementById("deleteSaved");

  const elTable = document.getElementById("table");
  const elApplyBtn = document.getElementById("applyBtn");
  const elClear = document.getElementById("clearBtn");
  const diagPills = document.getElementById("diagPills");

  let plan = null;
  let employees = [];
  let selectedEmployee = null;
  let lastParseInfo = null;

  function updateActiveStatus(){
    const state = loadState();
    let text = "Aktiver Plan: keiner";

    if(state.activeId && state.plans[state.activeId]){
      const p = state.plans[state.activeId];
      const stamp = p.updatedAt ? p.updatedAt.slice(0,16).replace("T"," ") : "";
      text = `Aktiver Plan: ${p.name} ${stamp ? "(" + stamp + ")" : ""}`;
    }

    elActiveStatus.textContent = text;
  }

  function refreshPlanSelect(){
    const state = loadState();
    const entries = Object.entries(state.plans)
      .map(([id, p])=>({ id, ...p }))
      .sort((a,b)=>(b.updatedAt || "").localeCompare(a.updatedAt || ""));

    elPlanSelect.innerHTML = "";

    const opt0 = document.createElement("option");
    opt0.value = "";
    opt0.textContent = "— keinen auswählen —";
    elPlanSelect.appendChild(opt0);

    for(const p of entries){
      const opt = document.createElement("option");
      opt.value = p.id;
      const stamp = p.updatedAt ? p.updatedAt.slice(0,16).replace("T"," ") : "";
      opt.textContent = `${p.name} (${stamp})`;
      elPlanSelect.appendChild(opt);
    }

    elPlanSelect.value = loadState().activeId || "";
    updateActiveStatus();
  }

  function renderDiagnostics(diag){
    const state = loadState();
    const active = state.activeId ? "Aktiv-Plan: JA" : "Aktiv-Plan: NEIN";
    const pills = [];

    pills.push(`<span class="pill">Erkannt: <strong>${diag.count}</strong></span>`);
    pills.push(`<span class="pill">Zyklus: <strong>${plan ? plan.cycle.length : "-"}</strong></span>`);
    pills.push(`<span class="pill">Runden/Tag: <strong>${ROUNDS_PER_DAY}</strong></span>`);
    pills.push(`<span class="pill">Mitarbeiter: <strong>${diag.employeeCount}</strong></span>`);
    pills.push(`<span class="pill">Stationen: <strong>${diag.stationCount}</strong></span>`);
    pills.push(`<span class="pill">BESETZT: <strong>${diag.occupiedCount}</strong></span>`);

    if(diag.min !== null && diag.max !== null){
      pills.push(`<span class="pill">Takte: <strong>${diag.min}–${diag.max}</strong></span>`);
    }

    pills.push(`<span class="pill">${active}</span>`);

    if(diag.dups.length){
      pills.push(`<span class="pill">Doppelt: <strong>${diag.dups.join(", ")}</strong></span>`);
    }

    if(diag.missing.length){
      const preview = diag.missing.length > 10
        ? diag.missing.slice(0, 10).join(", ") + " …"
        : diag.missing.join(", ");
      pills.push(`<span class="pill">Fehlt: <strong>${preview}</strong></span>`);
    }

    if(lastParseInfo && lastParseInfo.skipped && lastParseInfo.skipped.length){
      pills.push(`<span class="pill">Übersprungen: <strong>${lastParseInfo.skipped.length}</strong></span>`);
    }

    diagPills.innerHTML = pills.join("");
  }

  function setEnabled(on){
    elSearchBtn.disabled = !on;
    elSearchDay.disabled = !on;
    elSearchRound.disabled = !on;
    elSearchStation.disabled = !on;
  }

  function renderEmployeeButtons(){
    empBar.innerHTML = "";
    if(!employees.length) return;

    employees.forEach(name=>{
      const btn = document.createElement("button");
      btn.type = "button";
      btn.textContent = name;

      if(selectedEmployee && normName(selectedEmployee) === normName(name)){
        btn.classList.add("active");
      }

      btn.addEventListener("click", ()=>{
        haptic("tap");
        selectedEmployee = name;
        saveUiState();
        empBar.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");

        try{
          showWeek();
        } catch(e){
          showErr(e.message || String(e));
        }
      });

      empBar.appendChild(btn);
    });
  }

  function populateStationDropdown(keepCurrent=true){
    const prev = keepCurrent ? elSearchStation.value : "";
    elSearchStation.innerHTML = "";

    if(!plan){
      const opt = document.createElement("option");
      opt.value = "";
      opt.textContent = "Kein Plan";
      elSearchStation.appendChild(opt);
      return;
    }

    const stations = Array.from(
      new Set(
        plan.rows
          .filter(r => normName(r.mitarbeiter) !== "BESETZT")
          .map(r => r.bezeichnung.trim())
          .filter(Boolean)
      )
    ).sort((a,b)=>normName(a).localeCompare(normName(b)));

    if(!stations.length){
      const opt = document.createElement("option");
      opt.value = "";
      opt.textContent = "Keine Stationen";
      elSearchStation.appendChild(opt);
      return;
    }

    stations.forEach(st=>{
      const opt = document.createElement("option");
      opt.value = st;
      opt.textContent = st;
      elSearchStation.appendChild(opt);
    });

    const ui = loadJSON(UI_KEY, { haptics:"on" });
    const wanted = prev || ui.searchStation || "";

    if(wanted && stations.includes(wanted)){
      elSearchStation.value = wanted;
    }
  }

  function applyPlan(options = {}){
    const {
      showSuccess = true,
      keepResult = false
    } = options;

    const text = elTable.value;
    hideWeek();
    if(!keepResult) elResult.classList.add("hide");

    const parsed = parseTable(text);
    const rows = parsed.rows;
    lastParseInfo = parsed;

    if(!rows.length){
      throw new Error("Keine gültigen Zeilen erkannt.");
    }

    const newPlan = new TaktPlan(rows);
    plan = newPlan;

    employees = Array.from(new Set(plan.cycle.map(r=>r.mitarbeiter.trim())))
      .sort((a,b)=>normName(a).localeCompare(normName(b)));

    const ui = loadJSON(UI_KEY, { haptics:"on" });
    const wantedEmployee = ui.selectedEmployee;
    selectedEmployee = employees.find(n => normName(n) === normName(wantedEmployee)) || employees[0] || null;

    renderEmployeeButtons();
    populateStationDropdown(true);
    setEnabled(!!plan);

    const diag = diagnostics(rows);
    renderDiagnostics(diag);
    saveUiState();

    if(selectedEmployee){
      try{
        showWeek();
      } catch {}
    }

    if(showSuccess){
      if(parsed.skipped.length){
        const preview = parsed.skipped.slice(0, 3).map(x => safeHtml(x.reason)).join(" • ");
        showWarn(`
          <div><strong>Plan angewendet, aber mit Hinweisen.</strong></div>
          <div style="margin-top:8px;">Erkannte Zeilen: <strong>${rows.length}</strong></div>
          <div>Übersprungene Zeilen: <strong>${parsed.skipped.length}</strong></div>
          <div class="small" style="margin-top:8px;">Gründe: ${preview}${parsed.skipped.length > 3 ? " • …" : ""}</div>
        `);
      } else {
        showOk(`Plan angewendet. Mitarbeiter antippen für Wochenübersicht, Stations-Suche ist aktiv.`);
      }
    }
  }

  function showWeek(){
    if(!plan) throw new Error("Bitte erst Plan anwenden.");
    if(!selectedEmployee) throw new Error("Bitte einen Mitarbeiter oben auswählen.");

    const employee = selectedEmployee;
    const mode = elWeekStart.value || "mon";
    const data = plan.weeklyOverview(employee, mode);
    const label = mode === "sun" ? "So–Fr" : "Mo–Fr";

    elWeek.classList.remove("hide");
    elWeek.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;">
        <div style="font-weight:900;">Wochenübersicht (${label}): ${safeHtml(employee)}</div>
        <div class="small">Runden/Tag: ${plan.roundsPerDay}</div>
      </div>
      <table>
        <thead><tr><th>Tag</th><th>R</th><th>Station</th><th>Takt</th></tr></thead>
        <tbody>
          ${data.map(r=>`
            <tr>
              <td>${safeHtml(r.tag)}</td>
              <td>${r.runde}</td>
              <td>${safeHtml(r.station)}</td>
              <td class="mono">${r.takt}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    `;
  }

  function searchStation(){
    if(!plan) throw new Error("Bitte erst Plan anwenden.");

    const dayKey = elSearchDay.value;
    const roundNo = parseInt(elSearchRound.value, 10);
    const mode = elWeekStart.value || "mon";
    const station = elSearchStation.value;

    if(!station){
      throw new Error("Bitte eine Station auswählen.");
    }

    const hits = plan.findEmployeesByStation(dayKey, roundNo, station, mode);
    const dayName = dayKeyToName(dayKey);

    saveUiState();

    if(!hits.length){
      showErr(`Kein Mitarbeiter mit Station „${station}“ in Runde ${roundNo} am ${dayName} gefunden.`);
      return;
    }

    const list = hits.map(h => `
      <div style="padding:8px 0; border-bottom:1px solid var(--border);">
        <div style="font-weight:900;">${safeHtml(h.name)}</div>
        <div style="font-size:14px;">${safeHtml(h.station)}</div>
        <div class="mono" style="font-size:12px; color:var(--muted);">Takt ${h.takt}</div>
      </div>
    `).join("");

    showOk(`
      <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
        <span class="pill">${safeHtml(dayName)}</span>
        <span class="pill">Runde <strong>${roundNo}</strong></span>
        <span class="pill">Station <strong>${safeHtml(station)}</strong></span>
      </div>
      <div style="margin-top:10px;">
        ${list}
      </div>
    `);
  }

  function saveNewPlan(){
    const name = (elPlanName.value || "").trim();
    if(!name) throw new Error("Bitte einen Namen eingeben (z. B. 'Standardwoche').");

    const text = elTable.value;
    if(!text.trim()) throw new Error("Plan-Text ist leer.");

    const parsed = parseTable(text);
    if(!parsed.rows.length) throw new Error("Plan enthält keine gültigen Zeilen.");

    new TaktPlan(parsed.rows);

    const state = loadState();
    const exists = Object.values(state.plans).some(p => normName(p.name) === normName(name));
    if(exists) throw new Error("Ein Plan mit diesem Namen existiert bereits.");

    const id = uid();
    state.plans[id] = { name, text, rounds: ROUNDS_PER_DAY, updatedAt: nowISO() };
    state.activeId = id;
    saveState(state);
    refreshPlanSelect();
  }

  function overwriteActivePlan(){
    const state = loadState();
    const id = state.activeId;

    if(!id || !state.plans[id]) throw new Error("Kein aktiver Plan ausgewählt.");

    const text = elTable.value;
    if(!text.trim()) throw new Error("Plan-Text ist leer.");

    const parsed = parseTable(text);
    if(!parsed.rows.length) throw new Error("Plan enthält keine gültigen Zeilen.");

    new TaktPlan(parsed.rows);

    state.plans[id] = { ...state.plans[id], text, rounds: ROUNDS_PER_DAY, updatedAt: nowISO() };
    saveState(state);
    refreshPlanSelect();
  }

  function loadSelectedPlan(){
    const state = loadState();
    const id = elPlanSelect.value;
    if(!id || !state.plans[id]) throw new Error("Kein gespeicherter Plan ausgewählt.");

    const p = state.plans[id];
    elTable.value = p.text || "";
    saveDraft();

    state.activeId = id;
    saveState(state);
    refreshPlanSelect();

    applyPlan({ showSuccess: false });
    showOk(`Plan geladen & angewendet: <strong>${safeHtml(p.name)}</strong>`);
  }

  function deleteSelectedPlan(){
    const state = loadState();
    const id = elPlanSelect.value;
    if(!id || !state.plans[id]) throw new Error("Kein gespeicherter Plan ausgewählt.");

    const name = state.plans[id].name || id;

    if(!confirm(`Plan wirklich löschen?\n\n${name}`)) return;

    delete state.plans[id];
    if(state.activeId === id) state.activeId = null;
    saveState(state);
    refreshPlanSelect();

    showOk(`Plan gelöscht: <strong>${safeHtml(name)}</strong>`);

    if(!loadState().activeId){
      updateActiveStatus();
    }
  }

  (function init(){
    const ui = loadJSON(UI_KEY, { haptics:"on" });
    setHaptics(ui.haptics || "on");
    restoreUiState();

    const draft = loadDraft();
    if(draft && draft.text) elTable.value = draft.text;

    refreshPlanSelect();
    setEnabled(false);
    populateStationDropdown();

    const state = loadState();
    if(state.activeId && state.plans[state.activeId]){
      const p = state.plans[state.activeId];
      elTable.value = p.text || "";
      saveDraft();

      try{
        applyPlan({ showSuccess: false, keepResult: true });
        showOk(`Aktiver Plan automatisch geladen: <strong>${safeHtml(p.name)}</strong>`, false);
      } catch(e){
        showErr("Aktiver gespeicherter Plan konnte nicht automatisch geladen werden.", false);
      }
    }
  })();

  haptOn.addEventListener("click", ()=>{
    setHaptics("on");
    haptic("tap");
  });

  haptOff.addEventListener("click", ()=>{
    setHaptics("off");
  });

  elTable.addEventListener("input", ()=>{
    saveDraft();
  });

  elWeekStart.addEventListener("change", ()=>{
    saveUiState();
    if(plan && selectedEmployee){
      try{
        showWeek();
      } catch(e){
        hideWeek();
        showErr(e.message || String(e));
      }
    } else {
      hideWeek();
    }
  });

  elSearchDay.addEventListener("change", saveUiState);
  elSearchRound.addEventListener("change", saveUiState);
  elSearchStation.addEventListener("change", saveUiState);
  elPlanName.addEventListener("input", saveUiState);

  elApplyBtn.addEventListener("click", ()=>{
    try{
      haptic("tap");
      applyPlan();
    } catch(e){
      plan = null;
      setEnabled(false);
      populateStationDropdown(false);
      empBar.innerHTML = "";
      selectedEmployee = null;
      hideWeek();
      diagPills.innerHTML = "";
      showErr(e.message || String(e));
      saveUiState();
    }
  });

  elClear.addEventListener("click", ()=>{
    haptic("tap");
    elTable.value = "";
    saveDraft();

    plan = null;
    employees = [];
    empBar.innerHTML = "";
    selectedEmployee = null;
    setEnabled(false);
    hideWeek();
    elResult.classList.add("hide");
    diagPills.innerHTML = "";
    lastParseInfo = null;

    populateStationDropdown(false);
    saveUiState();
  });

  elSaveNew.addEventListener("click", ()=>{
    try{
      haptic("tap");
      saveNewPlan();
      const st = loadState();
      showOk(`Gespeichert und aktiviert: <strong>${safeHtml(st.plans[st.activeId].name)}</strong>`);
    } catch(e){
      showErr(e.message || String(e));
    }
  });

  elOverwriteActive.addEventListener("click", ()=>{
    try{
      haptic("tap");
      overwriteActivePlan();
      showOk(`Aktiver Plan überschrieben.`);
    } catch(e){
      showErr(e.message || String(e));
    }
  });

  elLoadSaved.addEventListener("click", ()=>{
    try{
      haptic("tap");
      loadSelectedPlan();
    } catch(e){
      showErr(e.message || String(e));
    }
  });

  elDeleteSaved.addEventListener("click", ()=>{
    try{
      haptic("tap");
      deleteSelectedPlan();
    } catch(e){
      showErr(e.message || String(e));
    }
  });

  elSearchBtn.addEventListener("click", ()=>{
    try{
      haptic("tap");
      searchStation();
    } catch(e){
      showErr(e.message || String(e));
    }
  });
</script>
</body>
</html>
